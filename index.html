<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuxin Chen — 在AI时代认真生活的女生</title>
<meta name="description" content="Yuxin Chen 的个人网站。建筑/考古→产品经理，在AI时代认真生活的女生。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Caveat:wght@400;600&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
/* ============ RESET & BASE ============ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; overflow-x: hidden; }
body {
  font-family: 'Noto Sans SC', 'Inter', sans-serif;
  color: #1a1a1a;
  background: #fefcf6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::selection { background: #ff2442; color: #fff; }

/* ============ CUSTOM CURSOR GLOW ============ */
.cursor-glow {
  position: fixed;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,36,66,0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
  opacity: 0;
}
body:hover .cursor-glow { opacity: 1; }

/* ============ HERO — TERMINAL STYLE ============ */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #0d1117;
  position: relative;
  overflow: hidden;
  padding: 2rem;
}

/* 顶部邮箱 */
.hero-email-bar {
  position: absolute;
  top: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.15em;
  z-index: 2;
  white-space: nowrap;
}
.hero-email-bar a {
  color: rgba(255,255,255,0.25);
  text-decoration: none;
  transition: color 0.3s;
}
.hero-email-bar a:hover {
  color: #ff2442;
}

.terminal-window {
  width: 100%;
  max-width: 720px;
  background: #161b22;
  border-radius: 12px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
  z-index: 2;
}
.terminal-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px;
  background: #1c2129;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.terminal-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}
.terminal-dot--red   { background: #ff5f57; }
.terminal-dot--yellow{ background: #febc2e; }
.terminal-dot--green { background: #28c840; }
.terminal-header-title {
  flex: 1;
  text-align: center;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  margin-right: 52px;
}

.terminal-body {
  padding: 1.8rem 2rem 2.5rem;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: clamp(0.85rem, 1.8vw, 1rem);
  line-height: 1.8;
  min-height: 320px;
}
.terminal-line {
  opacity: 0;
  white-space: pre-wrap;
  word-break: break-all;
}
.terminal-line.visible { opacity: 1; }
.terminal-line .cmd      { color: #ff2442; }
.terminal-line .cmd-text { color: #8b949e; }
.terminal-line .output   { color: #f0f0f0; }
.terminal-line .highlight { color: #28c840; }
.terminal-line .link {
  color: #ff2442;
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 3px;
  cursor: default;
}

.terminal-cursor {
  display: inline-block;
  width: 0.6em;
  height: 1.15em;
  background: #ff2442;
  vertical-align: text-bottom;
  animation: cursorBlink 1s step-end infinite;
}
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 0.8; transform: translateY(0); }
}

.hero-scroll {
  position: absolute;
  bottom: 3rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.6s 8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.hero-scroll span {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.hero-scroll-line {
  width: 1px; height: 40px;
  background: #ff2442;
  opacity: 0.4;
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%, 100% { transform: scaleY(1); opacity: 0.3; }
  50%       { transform: scaleY(1.5); opacity: 0.6; }
}

/* ============ RESPONSIVE ============ */
@media (max-width: 768px) {
  .terminal-window { border-radius: 8px; }
  .terminal-body   { padding: 1.2rem 1rem 2rem; font-size: 0.8rem; min-height: 260px; }
  .terminal-header-title { display: none; }
  .hero-email-bar  { font-size: 0.65rem; }
}
</style>
</head>
<body>

<!-- Cursor glow -->
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ==================== HERO — TERMINAL ==================== -->
<section class="hero">

  <!-- 顶部邮箱 -->
  <div class="hero-email-bar">
    <a href="mailto:Yuxin@earth.online">Yuxin@earth.online</a>
  </div>

  <div class="terminal-window">
    <div class="terminal-header">
      <div class="terminal-dot terminal-dot--red"></div>
      <div class="terminal-dot terminal-dot--yellow"></div>
      <div class="terminal-dot terminal-dot--green"></div>
      <div class="terminal-header-title">yuxin@universe ~ %</div>
    </div>
    <div class="terminal-body" id="terminalBody">
      <!-- Lines injected by JS typewriter -->
    </div>
  </div>

  <div class="hero-scroll">
    <span>Scroll</span>
    <div class="hero-scroll-line"></div>
  </div>
</section>

<script>
/* ============ TERMINAL TYPEWRITER ============ */
(function() {
  const body = document.getElementById('terminalBody');

  const lines = [
    { type: 'cmd',    text: '$ whoami' },
    { type: 'output', html: '<span class="output">Yuxin Chen</span>' },
    { type: 'blank' },
    { type: 'cmd',    text: '$ cat about.md' },
    { type: 'output', html: '<span class="output">在AI时代认真生活的女生｜ISTJ</span>' },
    { type: 'output', html: '<span class="output">跟Agent搭档的第一年</span>' },
    { type: 'output', html: '<span class="output">建筑/考古→产品经理</span>' },
    { type: 'output', html: '<span class="link">💕 关于[她]在AI时代</span>' },
    { type: 'blank' },
    { type: 'cmd',    text: '$ echo "1 person + AI = 1 team"' },
    { type: 'output', html: '<span class="highlight">✨</span>' },
  ];

  const lineEls = [];
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'terminal-line';
    if (line.type === 'blank') div.innerHTML = '&nbsp;';
    lineEls.push({ el: div, data: line });
    body.appendChild(div);
  });

  // Cursor line
  const cursorLine = document.createElement('div');
  cursorLine.className = 'terminal-line visible';
  cursorLine.innerHTML = '<span class="terminal-cursor"></span>';
  cursorLine.style.opacity = '0';
  body.appendChild(cursorLine);

  let lineIdx = 0;

  function typeNextLine() {
    if (lineIdx >= lineEls.length) {
      cursorLine.style.opacity = '1';
      return;
    }
    const { el, data } = lineEls[lineIdx];
    el.classList.add('visible');
    lineIdx++;

    if (data.type === 'blank') {
      setTimeout(typeNextLine, 150);
      return;
    }
    if (data.type === 'cmd') {
      typeText(el, data.text, 45, () => setTimeout(typeNextLine, 300));
    } else {
      const prefix = '<span class="cmd">&gt; </span>';
      el.innerHTML = prefix;
      setTimeout(() => {
        el.innerHTML = prefix + data.html;
        setTimeout(typeNextLine, 200);
      }, 120);
    }
  }

  function typeText(el, text, speed, callback) {
    const parts = text.match(/^(\$ )(.*)/);
    if (parts) {
      el.innerHTML = '<span class="cmd">$ </span>';
      const rest = parts[2];
      let i = 0;
      (function typeChar() {
        if (i < rest.length) {
          el.innerHTML = '<span class="cmd">$ </span><span class="cmd-text">' + rest.substring(0, i + 1) + '</span>';
          i++;
          setTimeout(typeChar, speed + Math.random() * 30);
        } else {
          if (callback) callback();
        }
      })();
    } else {
      el.textContent = '';
      let i = 0;
      (function typeChar() {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(typeChar, speed);
        } else {
          if (callback) callback();
        }
      })();
    }
  }

  setTimeout(typeNextLine, 600);
})();

/* ============ MOUSE FOLLOW CURSOR GLOW ============ */
(function() {
  const glow = document.getElementById('cursorGlow');
  let mx = 0, my = 0, gx = 0, gy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animate() {
    gx += (mx - gx) * 0.08;
    gy += (my - gy) * 0.08;
    glow.style.left = gx + 'px';
    glow.style.top  = gy + 'px';
    requestAnimationFrame(animate);
  })();
})();

/* ============ PARALLAX ON SCROLL ============ */
(function() {
  const win = document.querySelector('.terminal-window');
  if (!win) return;
  window.addEventListener('scroll', () => {
    const st = window.pageYOffset;
    if (st < window.innerHeight) {
      win.style.transform = `translateY(${st * 0.15}px)`;
      win.style.opacity = 1 - (st / window.innerHeight) * 0.6;
    }
  }, { passive: true });
})();
</script>
</body>
</html>
