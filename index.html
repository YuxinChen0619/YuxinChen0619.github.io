<style>
/* ============ RESET & BASE ============ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; overflow-x: hidden; }
body {
  font-family: 'Noto Sans SC', 'Inter', sans-serif;
  color: #1a1a1a;
  background: #fefcf6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::selection { background: #ff2442; color: #fff; }

/* ============ CUSTOM CURSOR GLOW ============ */
.cursor-glow {
  position: fixed;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,36,66,0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
  opacity: 0;
}
body:hover .cursor-glow { opacity: 1; }

/* ============ HERO — TERMINAL STYLE ============ */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #0d1117;
  position: relative;
  overflow: hidden;
  padding: 2rem;
}

/* 顶部邮箱 — 已移除 */

.terminal-window {
  width: 100%;
  max-width: 720px;
  background: #161b22;
  border-radius: 12px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
  z-index: 2;
}
.terminal-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px;
  background: #1c2129;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.terminal-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}
.terminal-dot--red   { background: #ff5f57; }
.terminal-dot--yellow{ background: #febc2e; }
.terminal-dot--green { background: #28c840; }
.terminal-header-title {
  flex: 1;
  text-align: center;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  margin-right: 52px;
}

.terminal-body {
  padding: 1.8rem 2rem 2.5rem;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: clamp(0.85rem, 1.8vw, 1rem);
  line-height: 1.8;
  min-height: 320px;
}
.terminal-line {
  opacity: 0;
  white-space: pre-wrap;
  word-break: break-all;
}
.terminal-line.visible { opacity: 1; }
.terminal-line .cmd      { color: #ff2442; }
.terminal-line .cmd-text { color: #8b949e; }
.terminal-line .output   { color: #f0f0f0; }
.terminal-line .highlight { color: #28c840; }
.terminal-line .link {
  color: #ff2442;
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 3px;
  cursor: default;
}

.terminal-cursor {
  display: inline-block;
  width: 0.6em;
  height: 1.15em;
  background: #ff2442;
  vertical-align: text-bottom;
  animation: cursorBlink 1s step-end infinite;
}
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 0.8; transform: translateY(0); }
}

.hero-scroll {
  position: absolute;
  bottom: 3rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.6s 8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.hero-scroll span {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.hero-scroll-line {
  width: 1px; height: 40px;
  background: #ff2442;
  opacity: 0.4;
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%, 100% { transform: scaleY(1); opacity: 0.3; }
  50%       { transform: scaleY(1.5); opacity: 0.6; }
}

/* ============ RESPONSIVE ============ */
@media (max-width: 768px) {
  .terminal-window { border-radius: 8px; }
  .terminal-body   { padding: 1.2rem 1rem 2rem; font-size: 0.8rem; min-height: 260px; }

<script>
/* ============ TERMINAL TYPEWRITER ============ */
(function() {
  const body = document.getElementById('terminalBody');

  const lines = [
    { type: 'cmd',    text: '$ whoami' },
    { type: 'output', html: '<span class="output">Yuxin Chen</span>' },
    { type: 'blank' },
    { type: 'cmd',    text: '$ cat about.md' },
    { type: 'output', html: '<span class="output">在AI时代认真生活的女生｜ISTJ</span>' },
    { type: 'output', html: '<span class="output">跟Agent搭档的第一年</span>' },
    { type: 'output', html: '<span class="output">建筑/考古→产品经理</span>' },
    { type: 'output', html: '<span class="link">💕 关于[她]在AI时代</span>' },
    { type: 'blank' },
    { type: 'cmd',    text: '$ echo "1 person + AI = 1 team"' },
    { type: 'output', html: '<span class="highlight">✨</span>' },
  ];

  const lineEls = [];
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'terminal-line';
    if (line.type === 'blank') div.innerHTML = '&nbsp;';
    lineEls.push({ el: div, data: line });
    body.appendChild(div);
  });

  // Cursor line
  const cursorLine = document.createElement('div');
  cursorLine.className = 'terminal-line visible';
  cursorLine.innerHTML = '<span class="terminal-cursor"></span>';
  cursorLine.style.opacity = '0';
  body.appendChild(cursorLine);

  let lineIdx = 0;

  function typeNextLine() {
    if (lineIdx >= lineEls.length) {
      cursorLine.style.opacity = '1';
      return;
    }
    const { el, data } = lineEls[lineIdx];
    el.classList.add('visible');
    lineIdx++;

    if (data.type === 'blank') {
      setTimeout(typeNextLine, 150);
      return;
    }
    if (data.type === 'cmd') {
      typeText(el, data.text, 45, () => setTimeout(typeNextLine, 300));
    } else {
      const prefix = '<span class="cmd">&gt; </span>';
      el.innerHTML = prefix;
      setTimeout(() => {
        el.innerHTML = prefix + data.html;
        setTimeout(typeNextLine, 200);
      }, 120);
    }
  }

  function typeText(el, text, speed, callback) {
    const parts = text.match(/^(\$ )(.*)/);
    if (parts) {
      el.innerHTML = '<span class="cmd">$ </span>';
      const rest = parts[2];
      let i = 0;
      (function typeChar() {
        if (i < rest.length) {
          el.innerHTML = '<span class="cmd">$ </span><span class="cmd-text">' + rest.substring(0, i + 1) + '</span>';
          i++;
          setTimeout(typeChar, speed + Math.random() * 30);
        } else {
          if (callback) callback();
        }
      })();
    } else {
      el.textContent = '';
      let i = 0;
      (function typeChar() {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(typeChar, speed);
        } else {
          if (callback) callback();
        }
      })();
    }
  }

  setTimeout(typeNextLine, 600);
})();

    { side: 'yuxin', text: '对，做的是最贴近真实交易的一线工作——GMV增长、价格竞争力、商家痛点 📦' },
    { side: 'yuxin', text: '这给了我很多产品经理没有的东西：真实的商业直觉，知道一线业务真正卡在哪' },
    { side: 'bubu', tag: 'TikTok · AI产品 & GTM', text: '然后去了TikTok做AI产品？' },
    { side: 'yuxin', text: '嗯，做AIGC能力层的产品经理，积累了对底层链路和迭代方法的认知 🤖' },
    { side: 'yuxin', text: '这是从"懂业务"走向"懂AI产品"的一步' },
    { side: 'bubu', tag: '小红书 · 现在 🌟', text: '现在在小红书做什么？' },
    { side: 'yuxin', text: '商业化AI产品经理，把数据驱动和AI能力用在广告效率提升上，离业务结果更近 🎯' },
    { side: 'bubu', text: '三段经历跨度挺大的，你怎么看自己这条路？' },
    { side: 'yuxin', text: '乍一看像到处试水，但其实有一条很清晰的主线——' },
    { side: 'yuxin', text: '一线业务认知 → AI产品能力 → 商业化策略落地 📈' },
    { side: 'yuxin', text: '我喜欢用数据和产品手段解决真实经营场景里的问题，一直都是这件事 💡' },
    { side: 'bubu', text: '路不直，但方向一直在 ✨' },
    { side: 'yuxin', text: '对，每一步都算数 🫧' },
  ];

  function makeBubble(d) {
    const wrap = document.createElement('div');
    wrap.className = `cbubble cbubble--${d.side}`;
    let inner = '';
    inner += `<div class="cbubble-name">${d.side === 'bubu' ? '🥕 卜卜' : 'Yuxin'}</div>`;
    if (d.tag) inner += `<div class="cbubble-tag">${d.tag}</div>`;
    inner += `<div class="cbubble-msg">${d.text}</div>`;
    wrap.innerHTML = inner;
    return wrap;
  }

  function animateBubbles(container, data, delay) {
    data.forEach((d, i) => {
      const el = makeBubble(d);
      container.appendChild(el);
      setTimeout(() => {
        el.classList.add('pop');
      }, delay + i * 280);
    });
  }

  let triggered = false;
  const screens = document.getElementById('aboutScreens');
  const label   = document.getElementById('aboutLabel');
  const headline= document.getElementById('aboutHeadline');

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !triggered) {
        triggered = true;
        label.classList.add('visible');
        setTimeout(() => headline.classList.add('visible'), 120);
        setTimeout(() => {
          screens.classList.add('visible');
          animateBubbles(document.getElementById('chatOne'), chatOneData, 200);
          animateBubbles(document.getElementById('chatTwo'), chatTwoData, 600);
        }, 300);
      }
    });
  }, { threshold: 0.15 });

  obs.observe(document.getElementById('aboutSection'));
})();


/* ============ OPINIONS + FADE-UP — SCROLL TRIGGER ============ */
(function() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.fade-up, .opinion-text').forEach(el => observer.observe(el));
})();

/* ============ MOUSE FOLLOW CURSOR GLOW ============ */
(function() {
  const glow = document.getElementById('cursorGlow');
  let mx = 0, my = 0, gx = 0, gy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animate() {
    gx += (mx - gx) * 0.08;
    gy += (my - gy) * 0.08;
    glow.style.left = gx + 'px';
    glow.style.top  = gy + 'px';
    requestAnimationFrame(animate);
  })();
})();

/* ============ PARALLAX ON SCROLL ============ */
(function() {
  const win = document.querySelector('.terminal-window');
  if (!win) return;
  window.addEventListener('scroll', () => {
    const st = window.pageYOffset;
    if (st < window.innerHeight) {
      win.style.transform = `translateY(${st * 0.15}px)`;
      win.style.opacity = 1 - (st / window.innerHeight) * 0.6;
    }
  }, { passive: true });
})();
</script>
